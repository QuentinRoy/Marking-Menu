---
root: true
env:
  browser: true
extends:
  - airbnb-base
  - prettier
parserOptions:
  ecmaVersion: 2022
settings:
  import/core-modules:
    - vite
rules:
  valid-jsdoc: error
  import/no-extraneous-dependencies:
    - error
    - peerDependencies: true
overrides:
  - files:
      - build-config/**
      - src/**/*.test.js
    rules:
      import/no-extraneous-dependencies:
        - error
        - devDependencies: true
          peerDependencies: true
  - files:
      - src/**/*.test.js
    env:
      jest: true
