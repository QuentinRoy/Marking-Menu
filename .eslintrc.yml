---
root: true
env:
  browser: true
extends:
  - airbnb-base
  - prettier
parserOptions:
  ecmaVersion: 2022
settings:
  import/core-modules:
    - vite
rules:
  valid-jsdoc: error
  import/no-extraneous-dependencies:
    - error
    - peerDependencies: true
overrides:
  - files:
      - build-config/**
      - src/**/*.test.js
    rules:
      import/no-extraneous-dependencies:
        - error
        - devDependencies: true
          peerDependencies: true
  - files:
      - src/**/*.test.js
    extends:
      - plugin:@vitest/legacy-recommended
    env:
      '@vitest/env': true
    rules:
      # rxjs-marbles' `m.expect(...)` is this suite's assertion entry point
      # alongside the ambient `expect`; the rule can't infer that statically.
      '@vitest/expect-expect':
        - error
        - assertFunctionNames: ['expect', 'm.expect']
      # describe() is called with an imported function reference in some
      # files (Vitest supports this the same way Jest does); the rule can't
      # resolve the import to confirm it's a function.
      '@vitest/valid-title':
        - error
        - allowArguments: true
